name: Deploy Report to Cloudflare Pages

on:
  # Daily at 13:00 UTC
  schedule:
    - cron: "0 13 * * *"

  # Manual trigger
  workflow_dispatch:
    inputs:
      reddit_sort:
        description: "Reddit sort order (hot|top|new|rising)"
        required: false
        default: "hot"
      reddit_limit:
        description: "Max posts per subreddit"
        required: false
        default: "25"
      news_limit:
        description: "Max articles per news feed"
        required: false
        default: "20"

jobs:
  build-and-deploy:
    name: Build Report & Deploy to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      # Restore ticker history so sparklines accumulate across runs
      - name: Restore ticker history
        uses: actions/cache@v4
        with:
          path: outputs/ticker_score_history.json
          key: ticker-history-${{ github.run_id }}
          restore-keys: |
            ticker-history-

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python run_pipeline.py \
            --sort "${{ github.event.inputs.reddit_sort || 'hot' }}" \
            --reddit-limit "${{ github.event.inputs.reddit_limit || '25' }}" \
            --news-limit "${{ github.event.inputs.news_limit || '20' }}" \
            --log-level INFO

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_number }}-${{ github.run_attempt }}
          path: outputs/
          retention-days: 30

      - name: Prepare Pages directory
        run: |
          mkdir -p _site
          latest_html=$(ls -t outputs/report_*.html | head -n 1)
          if [ -n "$latest_html" ]; then
            cp "$latest_html" _site/index.html
            echo "Deploying: $latest_html"
          else
            echo "No HTML report found"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=ai-market-report --branch=main

      # Save ticker history for next run
      - name: Save ticker history
        uses: actions/cache@v4
        with:
          path: outputs/ticker_score_history.json
          key: ticker-history-${{ github.run_id }}
